{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <div class="auth-brand">
    <div class="auth-brand-mark">T</div>
    <div>
      <h1 class="auth-title">TELEFAN</h1>
      <div class="auth-subtitle">Connexion</div>
    </div>
  </div>

  <form class="auth-form" method="post" novalidate>
    {{ form.hidden_tag() }}

    <div>
      <label class="form-label">Identifiant</label>
      {{ form.username(class_="input", autocomplete="username", placeholder="ex : admin") }}
    </div>

    <div>
      <label class="form-label">Mot de passe</label>
      {{ form.password(class_="input", autocomplete="current-password", placeholder="••••••••") }}
    </div>

    <button class="btn btn-primary" type="submit" style="width:100%; justify-content:center;">Se connecter</button>
  </form>
</div>
{% endblock %}
