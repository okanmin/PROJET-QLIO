{% extends "base.html" %}
{% block content %}
<section class="glass-card not-found-card">
  <p class="not-found-code">404</p>
  <h2 class="hero-title" style="margin-top:12px;">Page introuvable</h2>
  <p class="not-found-copy">Cette page n'existe pas.</p>
  <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
    {% if session.get('user') %}
    <a class="btn btn-primary" href="{{ url_for('auth.home') }}">Retour à l'accueil</a>
    {% else %}
    <a class="btn btn-primary" href="{{ url_for('auth.login') }}">Retour à la connexion</a>
    {% endif %}
  </div>
</section>
{% endblock %}
